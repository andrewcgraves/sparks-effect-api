# Adjacent segment run times (train in motion only — dwell is added at compile time).
# Source: CA HSR 2026 Business Plan travel-time matrix (https://hsr.ca.gov/communications-outreach/reports/business-plans/2026-business-plan/).
#
# Values are run-time only. Compiled Local SF→Anaheim ≈ 306 min = run sum 288 min
# (17280 s) + 12×90 s resolved dwell. Derived by stripping ~90 s schedule dwell
# per non-terminus segment from the 2026 Business Plan minute matrix, then
# proportionally recalibrating to the published 306-min all-stop figure.
#
# Segments are ordered in the primary service direction (SF → Anaheim for Phase 1).
# Brightline West spur segments (Palmdale → Las Vegas) are commented out for later use.
#
# Multi-hop origin–destination times are derived by summing consecutive segments in code
# (see Store.TravelTimeBetween). This replaces the full NxN matrix; callers do not store
# computed OD times — the store sums on demand.
#
# Station slugs match stations.yaml slug values.

scenario_slug: "ca-hsr"
provenance: calibrated
source: "2026 Business Plan Service Planning Methodology, Tables 3-3/3-4 (all-stop SF→Anaheim = 306 min)"
segments:
  # Phase 1: San Francisco → Anaheim (service direction)
  - from: sf
    to: millbrae
    run_seconds: 760
  - from: millbrae
    to: san-jose
    run_seconds: 2110
  - from: san-jose
    to: gilroy
    run_seconds: 1100
  - from: gilroy
    to: merced
    run_seconds: 3050
  - from: merced
    to: madera
    run_seconds: 1040
  - from: madera
    to: fresno
    run_seconds: 420
  - from: fresno
    to: kings-tulare
    run_seconds: 650
  - from: kings-tulare
    to: bakersfield
    run_seconds: 1320
  - from: bakersfield
    to: palmdale
    run_seconds: 1660
  - from: palmdale
    to: burbank-airport
    run_seconds: 2500
  - from: burbank-airport
    to: los-angeles
    run_seconds: 870
  - from: los-angeles
    to: anaheim
    run_seconds: 1800
