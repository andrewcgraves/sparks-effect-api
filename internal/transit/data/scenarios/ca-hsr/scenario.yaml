name: "California High-Speed Rail"
description: >
  The California High-Speed Rail system connecting San Francisco to Anaheim via the
  Central Valley, with a Desert Express extension to Las Vegas. Phase 1 opens the
  SF–LA corridor; the Palmdale–Las Vegas segment (Desert Xpress) is a separate
  operating concession sharing the Palmdale station.
