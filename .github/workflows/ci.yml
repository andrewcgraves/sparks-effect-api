name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  GO_VERSION: "1.25"

jobs:
  check:
    name: Test, lint, vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # `make itest` brings up a throwaway Postgres (via the same Makefile
      # targets used locally), runs the full suite with the DB integration tests
      # enabled, then tears the container down — DRY across local and CI.
      - name: Test (with Postgres integration)
        run: make itest

      - name: Vet
        run: make vet

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  build:
    name: Build
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: make build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sparks-effect-api
          path: bin/sparks-effect-api

  publish:
    name: Publish Docker image
    needs: [check, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
